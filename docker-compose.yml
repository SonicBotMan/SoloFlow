version: "3.8"

services:
  soloflow:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - MODEL=${MODEL:-gpt-4o}
      - SOLOFLOW_DB=/app/data/soloflow.db
    volumes:
      - soloflow-data:/app/data

volumes:
  soloflow-data:
